security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
            logout:
                path: app_logout
                target: app_home

    role_hierarchy:
        ROLE_ADMIN: [ROLE_CUISINIER, ROLE_USER]
        ROLE_CUISINIER: [ROLE_USER]

    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/docs, roles: PUBLIC_ACCESS }
        - { path: ^/_api/schema, roles: PUBLIC_ACCESS }
        - { path: ^/_api/graphql, roles: PUBLIC_ACCESS }
        - { path: ^/api/, roles: PUBLIC_ACCESS }
        - { path: ^/categories, roles: ROLE_ADMIN }
        - { path: ^/tags, roles: ROLE_ADMIN }
        - { path: ^/recettes/\d+/ingredients/, roles: ROLE_CUISINIER }
        - { path: ^/ingredients/\d+/supprimer, roles: ROLE_CUISINIER }
        - { path: ^/recettes/nouvelle, roles: ROLE_CUISINIER }
        - { path: ^/recettes/\d+/modifier, roles: ROLE_CUISINIER }
        - { path: ^/recettes/\d+/supprimer, roles: ROLE_CUISINIER }
        - { path: ^/mes-favoris, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
